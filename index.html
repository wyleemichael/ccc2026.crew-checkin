<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #1a0e08;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }
    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('https://i.imgur.com/8I0PjjL.jpeg');
      background-size: cover;
      background-position: center;
      opacity: 0.4;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 400px;
      text-align: center;
    }
    .title {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      color: #f0e6d3;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: rgba(200, 169, 110, 0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* SCAN VIEW */
    #scan-view { display: block; }
    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(200, 169, 110, 0.3);
      margin-bottom: 20px;
    }
    #reader video { border-radius: 12px; }
    .scan-hint {
      font-size: 12px;
      color: rgba(240, 230, 211, 0.45);
      letter-spacing: 1px;
      margin-top: 12px;
    }

    /* RESULT VIEW */
    #result-view { display: none; }
    .card {
      background: rgba(20, 10, 5, 0.78);
      border: 1px solid rgba(200, 169, 110, 0.35);
      border-radius: 12px;
      padding: 40px 32px;
      margin-bottom: 20px;
    }
    .icon { font-size: 52px; margin-bottom: 12px; }
    .status {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .status.success { color: #c8a96e; }
    .status.warning { color: #e0a030; }
    .status.error { color: #8B2020; }
    .divider {
      width: 40px; height: 1px;
      background: rgba(200, 169, 110, 0.4);
      margin: 0 auto 20px;
    }
    .name-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 700;
      color: #f0e6d3;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .name-en {
      font-size: 13px;
      color: rgba(240, 230, 211, 0.7);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .role {
      font-family: 'Noto Serif SC', serif;
      font-size: 12px;
      color: rgba(200, 169, 110, 0.9);
      letter-spacing: 2px;
    }
    .detail {
      font-size: 11px;
      color: rgba(200, 169, 110, 0.6);
      letter-spacing: 1px;
      margin-top: 16px;
    }
    .event-name {
      font-size: 10px;
      color: rgba(240, 230, 211, 0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 24px;
    }
    .btn-scan-again {
      width: 100%;
      padding: 14px;
      background: rgba(200, 169, 110, 0.15);
      border: 1px solid rgba(200, 169, 110, 0.4);
      border-radius: 8px;
      color: #c8a96e;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn-scan-again:active { opacity: 0.7; }

    /* LOADING */
    #loading-view {
      display: none;
      padding: 60px 0;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(200, 169, 110, 0.2);
      border-top-color: #c8a96e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 12px;
      color: rgba(200, 169, 110, 0.6);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <div class="title">寻昔纪远</div>
  <div class="subtitle">Crew Check-in</div>

  <div id="scan-view">
    <div id="reader"></div>
    <div class="scan-hint">将 QR Code 对准框内</div>
  </div>

  <div id="loading-view">
    <div class="spinner"></div>
    <div class="loading-text">正在记录...</div>
  </div>

  <div id="result-view">
    <div class="card">
      <div class="icon" id="res-icon"></div>
      <div class="status" id="res-status"></div>
      <div class="divider" id="res-divider" style="display:none"></div>
      <div class="name-cn" id="res-namecn"></div>
      <div class="name-en" id="res-nameen"></div>
      <div class="role" id="res-role"></div>
      <div class="detail" id="res-detail"></div>
      <div class="event-name">寻昔纪远 · Culture Camp 2026</div>
    </div>
    <button class="btn-scan-again" onclick="resetScanner()">再次扫描</button>
  </div>
</div>

<script>
  const WEB_APP_URL = "REPLACE_WITH_YOUR_WEB_APP_URL";
  let html5QrCode = null;

  function startScanner() {
    document.getElementById('scan-view').style.display = 'block';
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'none';

    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        html5QrCode.stop().then(() => {
          processQR(decodedText);
        });
      },
      () => {}
    );
  }

  function processQR(url) {
    document.getElementById('scan-view').style.display = 'none';
    document.getElementById('loading-view').style.display = 'block';

    let id = null;
    try {
      const urlObj = new URL(url);
      id = urlObj.searchParams.get('id');
    } catch(e) {
      id = url;
    }

    if (!id) {
      showResult('❌', 'error', 'Invalid QR Code', '', '', '');
      return;
    }

    fetch(`${WEB_APP_URL}?id=${id}`)
      .then(res => res.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const icon = doc.querySelector('.icon')?.textContent || '❌';
        const status = doc.querySelector('.status')?.textContent || 'Error';
        const nameCN = doc.querySelector('.name-cn')?.textContent || '';
        const nameEN = doc.querySelector('.name-en')?.textContent || '';
        const role = doc.querySelector('.role')?.textContent || '';
        const detail = doc.querySelector('.detail')?.textContent || '';
        showResult(icon, getStatusClass(icon), status, nameCN, nameEN, role, detail);
      })
      .catch(() => {
        showResult('❌', 'error', 'Connection Error', '', '', '');
      });
  }

  function getStatusClass(icon) {
    if (icon.includes('✅')) return 'success';
    if (icon.includes('⚠️')) return 'warning';
    return 'error';
  }

  function showResult(icon, statusClass, status, nameCN, nameEN, role, detail) {
    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'block';
    document.getElementById('res-icon').textContent = icon;
    document.getElementById('res-status').textContent = status;
    document.getElementById('res-status').className = `status ${statusClass}`;
    document.getElementById('res-namecn').textContent = nameCN;
    document.getElementById('res-nameen').textContent = nameEN;
    document.getElementById('res-role').textContent = role;
    document.getElementById('res-detail').textContent = detail;
    document.getElementById('res-divider').style.display = nameCN ? 'block' : 'none';

    if (statusClass === 'success') {
      setTimeout(() => resetScanner(), 4000);
    }
  }

  function resetScanner() {
    document.getElementById('result-view').style.display = 'none';
    startScanner();
  }

  startScanner();
</script>
</body>
</html>
