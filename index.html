<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #1a0e08;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }
    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('https://i.imgur.com/8I0PjjL.jpeg');
      background-size: cover;
      background-position: center;
      opacity: 0.4;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 400px;
      text-align: center;
      padding: 40px 0;
    }
    .title {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      color: #f0e6d3;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: rgba(200, 169, 110, 0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: rgba(200, 169, 110, 0.15);
      border: 1px solid rgba(200, 169, 110, 0.4);
      border-radius: 8px;
      color: #c8a96e;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 12px;
      display: block;
    }
    .btn:active { opacity: 0.7; }
    #start-view { display: block; }
    #scan-view { display: none; }
    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(200, 169, 110, 0.3);
      margin-bottom: 16px;
      background: #000;
    }
    #preview {
      width: 100%;
      display: block;
      border-radius: 12px;
    }
    .scan-line {
      position: absolute;
      left: 10%; width: 80%;
      height: 2px;
      background: rgba(200, 169, 110, 0.7);
      animation: scanMove 2s linear infinite;
    }
    @keyframes scanMove {
      0% { top: 10%; }
      100% { top: 90%; }
    }
    .scan-hint {
      font-size: 12px;
      color: rgba(240, 230, 211, 0.45);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    #result-view { display: none; }
    .card {
      background: rgba(20, 10, 5, 0.78);
      border: 1px solid rgba(200, 169, 110, 0.35);
      border-radius: 12px;
      padding: 40px 32px;
      margin-bottom: 20px;
    }
    .icon { font-size: 52px; margin-bottom: 12px; }
    .status {
      font-size: 11px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px;
    }
    .status.success { color: #c8a96e; }
    .status.warning { color: #e0a030; }
    .status.error { color: #8B2020; }
    .divider { width: 40px; height: 1px; background: rgba(200, 169, 110, 0.4); margin: 0 auto 20px; }
    .name-cn { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; color: #f0e6d3; letter-spacing: 4px; margin-bottom: 6px; }
    .name-en { font-size: 13px; color: rgba(240, 230, 211, 0.7); letter-spacing: 1px; margin-bottom: 8px; }
    .role { font-family: 'Noto Serif SC', serif; font-size: 12px; color: rgba(200, 169, 110, 0.9); letter-spacing: 2px; }
    .detail { font-size: 11px; color: rgba(200, 169, 110, 0.6); letter-spacing: 1px; margin-top: 16px; }
    .event-name { font-size: 10px; color: rgba(240, 230, 211, 0.3); letter-spacing: 2px; text-transform: uppercase; margin-top: 24px; }
    #loading-view { display: none; padding: 60px 0; }
    .spinner { width: 40px; height: 40px; border: 2px solid rgba(200, 169, 110, 0.2); border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: rgba(200, 169, 110, 0.6); letter-spacing: 2px; }
    canvas { display: none; }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <div class="title">寻昔纪远</div>
  <div class="subtitle">Crew Check-in</div>

  <div id="start-view">
    <button class="btn" id="startBtn" onclick="startScanner()">开始扫描</button>
  </div>

  <div id="scan-view">
    <div class="video-wrap">
      <video id="preview" autoplay playsinline muted></video>
      <div class="scan-line"></div>
    </div>
    <div class="scan-hint">将 QR Code 对准框内</div>
    <button class="btn" onclick="stopScanner()">停止扫描</button>
  </div>

  <div id="loading-view">
    <div class="spinner"></div>
    <div class="loading-text">正在记录...</div>
  </div>

  <div id="result-view">
    <div class="card">
      <div class="icon" id="res-icon"></div>
      <div class="status" id="res-status"></div>
      <div class="divider" id="res-divider" style="display:none"></div>
      <div class="name-cn" id="res-namecn"></div>
      <div class="name-en" id="res-nameen"></div>
      <div class="role" id="res-role"></div>
      <div class="detail" id="res-detail"></div>
      <div class="event-name">寻昔纪远 · Culture Camp 2026</div>
    </div>
    <button class="btn" onclick="resetScanner()">再次扫描</button>
  </div>
</div>

<canvas id="canvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZstKPazsHqI4SkQWzZ8penmmWF3UTsX3po5hnZe93qQIBXhrcE1h4Lk1B_0hX2xbM/exec";
  let stream = null;
  let scanning = false;
  let animFrame = null;

  function show(id) {
    ['start-view','scan-view','loading-view','result-view'].forEach(v => {
      document.getElementById(v).style.display = v === id ? 'block' : 'none';
    });
  }

  function startScanner() {
  show('scan-view');
  scanning = true;
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' } }
  }).then(function(s) {
    stream = s;
    const video = document.getElementById('preview');
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadedmetadata', tick);
  }).catch(function(err) {
    show('start-view');
    alert('无法开启相机：' + err.message);
  });
}
  }

  function tick() {
    const video = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code) {
        scanning = false;
        stopStream();
        processQR(code.data);
        return;
      }
    }
    animFrame = requestAnimationFrame(tick);
  }

  function stopStream() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  function stopScanner() {
    scanning = false;
    stopStream();
    if (animFrame) cancelAnimationFrame(animFrame);
    show('start-view');
  }

  function processQR(url) {
    show('loading-view');
    let id = null;
    try {
      const urlObj = new URL(url);
      id = urlObj.searchParams.get('id');
    } catch(e) { id = url; }

    if (!id) {
      showResult('❌', 'error', 'Invalid QR Code', '', '', '');
      return;
    }

    window.location.href = `${https://script.google.com/macros/s/AKfycbzZstKPazsHqI4SkQWzZ8penmmWF3UTsX3po5hnZe93qQIBXhrcE1h4Lk1B_0hX2xbM/exec}?id=${id}`;
  }

  function showResult(icon, statusClass, status, nameCN, nameEN, role, detail) {
    show('result-view');
    document.getElementById('res-icon').textContent = icon;
    document.getElementById('res-status').textContent = status;
    document.getElementById('res-status').className = `status ${statusClass}`;
    document.getElementById('res-namecn').textContent = nameCN;
    document.getElementById('res-nameen').textContent = nameEN;
    document.getElementById('res-role').textContent = role;
    document.getElementById('res-detail').textContent = detail;
    document.getElementById('res-divider').style.display = nameCN ? 'block' : 'none';
  }

  function resetScanner() {
    scanning = false;
    show('start-view');
  }
</script>
</body>
</html>
